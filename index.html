<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Generation Engine - Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }

      #start-screen {
        text-align: center;
        background: rgba(0, 0, 0, 0.3);
        padding: 60px 40px;
        border-radius: 16px;
        backdrop-filter: blur(10px);
        max-width: 500px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      #start-screen:hover {
        transform: scale(1.05);
        background: rgba(0, 0, 0, 0.4);
      }

      #start-screen h1 {
        font-size: 48px;
        margin-bottom: 20px;
      }

      #start-screen p {
        font-size: 18px;
        opacity: 0.9;
        margin-bottom: 30px;
      }

      #start-screen .icon {
        font-size: 80px;
        margin-bottom: 20px;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        color: white;
        cursor: pointer;
        border-radius: 4px;
        transition: all 0.2s ease;
      }

      button:hover {
        opacity: 0.8;
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      input[type="range"] {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="start-screen">
      <div class="icon">🎵</div>
      <h1>Music Engine</h1>
      <p>Moteur de génération musicale algorithmique</p>
      <p style="font-size: 14px; opacity: 0.7">
        Cliquez n'importe où pour démarrer
      </p>
    </div>

    <script type="module" src="./example.js"></script>
  </body>
</html>
